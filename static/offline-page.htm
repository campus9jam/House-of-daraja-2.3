<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#050505"/>
  <title>House of Daraja — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050505;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .ring{width:100px;height:100px;border-radius:50%;border:2px solid rgba(197,160,89,0.35);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;animation:ringPulse 2s ease-in-out infinite}
    img{width:72px;height:72px;border-radius:50%;object-fit:cover}
    h1{font-family:Georgia,serif;font-size:2rem;font-weight:300;color:#C5A059;margin-bottom:.75rem}
    p{color:rgba(255,255,255,.4);font-size:.875rem;line-height:1.7;max-width:280px;margin:0 auto}
    .dots{display:flex;gap:6px;margin:2rem auto;justify-content:center}
    .dot{width:6px;height:6px;background:#C5A059;border-radius:50%;animation:bounce 1.4s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    .btn{margin-top:2rem;padding:.9rem 2.5rem;background:#C5A059;color:#050505;border:none;cursor:pointer;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700}
    .sub{margin-top:1.5rem;font-size:.625rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.15)}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
    @keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(197,160,89,0)}50%{box-shadow:0 0 20px 6px rgba(197,160,89,.15)}}
  </style>
</head>
<body>
  <div class="ring">
    <img src="/leema-icon.png" alt="Leema" onerror="this.src='/hd-logo.png'"/>
  </div>
  <h1>You're Offline</h1>
  <p>House of Daraja requires a connection to curate your experience. Your queued actions will sync automatically when your connection is restored.</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <button class="btn" onclick="window.location.reload()">Reconnect</button>
  <p class="sub">House of Daraja &middot; Wear Your Worth</p>
</body>
</html>
